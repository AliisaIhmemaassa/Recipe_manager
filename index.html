<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar" id="page-topbar">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">Dark theme</button>
    <button class="view-btn" id="lang-btn" onclick="changeLanguage()">Lang</button>
  </div>

  <div class="app" id="app">

    <div class="app" id="browse-tab">
      <div id="browse-search">
        
      </div>
      <div id="browse-pills"></div>
      <div id="browse-results"></div>
    </div>

    <div class="add-tab" id="add-tab">

    </div>

    <div class="detail-tab" id="detail-tab">

    </div>
  </div>
  
  <script src="script.js"></script>
  <script src="theme-toggle.js"></script>
</body>
</html>
