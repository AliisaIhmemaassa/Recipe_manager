<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="lock-screen" class="lock-screen">
    <div class="topbar" id="lock-topbar">
      <button class="theme-btn" id="theme-btn-l" onclick="toggleTheme()"></button>
      <button class="lang-btn" id="lang-btn-l" onclick="changeLanguage(this)"></button>
    </div>
    <div id="lock-box" class="lock-box"></div>
  </div> <!-- lock screen end -->


  <div class="app" id="app" style="display: none;">
    <div class="topbar" id="page-topbar">
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"></button>
      <button class="lang-btn" id="lang-btn" onclick="changeLanguage(this)"></button>
      <button class="view-btn" id="logout-btn" onclick="logout()">Log out</button>
    </div>

    <div class="browse-tab" id="browse-tab">
      <div id="browse-search"></div>
      <div id="browse-pills"></div>
      <div id="browse-results"></div>
    </div>

    <div class="add-tab" id="add-tab">

    </div>

    <div class="detail-tab" id="detail-tab">

    </div>

  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
